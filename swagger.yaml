openapi: 3.0.3

info:
  title: AlNas Projects API
  version: 1.0.0
  description: Small internal project management API using HR DB users.

servers:
  - url: http://localhost:5000/alnasPj
    description: Local server

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Workspaces
  - name: Projects
  - name: Tasks
  - name: Assignees
  - name: Comments
  - name: My Tasks

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      in: query
      name: page
      schema:
        type: integer
        example: 1

    Limit:
      in: query
      name: limit
      schema:
        type: integer
        example: 10

    Search:
      in: query
      name: search
      schema:
        type: string
        example: backend

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: "306"
        password:
          type: string
          example: "password123"

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful
        token_type:
          type: string
          example: Bearer
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 83
        username:
          type: string
          example: "306"
        email:
          type: string
          nullable: true
        display_name:
          type: string
          example: احمد عبدالفتاح محمود محمد
        role:
          type: string
          example: section_head
        employee_id:
          type: integer
          example: 83
        employee_number:
          type: integer
          example: 306
        is_active:
          type: boolean
          example: true

    WorkspaceCreate:
      type: object
      required: [department_id, name]
      properties:
        department_id:
          type: integer
          example: 29
        name:
          type: string
          example: IT Workspace
        description:
          type: string
          example: Internal IT projects
        color:
          type: string
          example: "#6366F1"

    ProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Backend Project
        description:
          type: string
          example: API and database work
        color:
          type: string
          example: "#6366F1"

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          example: Updated Backend Project
        description:
          type: string
          example: Updated description
        color:
          type: string
          example: "#3B82F6"
        workspace_id:
          type: integer
          example: 1

    TaskCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Build login API
        description:
          type: string
          example: Create auth controller and JWT middleware
        status:
          type: string
          enum: [todo, in_progress, done]
          example: todo
        priority:
          type: string
          enum: [low, medium, high]
          example: high
        due_date:
          type: string
          format: date
          nullable: true
          example: "2026-06-01"

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          example: Build login and logout API
        description:
          type: string
          example: Updated task description
        status:
          type: string
          enum: [todo, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        due_date:
          type: string
          format: date
          nullable: true
        project_id:
          type: integer
          example: 2

    AssigneeCreate:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: integer
          example: 83

    CommentCreate:
      type: object
      required: [content]
      properties:
        content:
          type: string
          example: This task is ready for review

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Server error

paths:
  /auth/login:
    post:
      security: []
      tags: [Auth]
      summary: Login using HR user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Logout successful

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user

  /workspaces:
    get:
      tags: [Workspaces]
      summary: Get workspaces
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Workspace list

    post:
      tags: [Workspaces]
      summary: Create workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceCreate"
      responses:
        "201":
          description: Workspace created

  /workspaces/{id}:
    get:
      tags: [Workspaces]
      summary: Get workspace by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workspace details

  /workspaces/{id}/projects:
    get:
      tags: [Projects]
      summary: Get workspace projects
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Project list

    post:
      tags: [Projects]
      summary: Create project inside workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: Project created

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Get project by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details

    patch:
      tags: [Projects]
      summary: Update project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Project updated

    delete:
      tags: [Projects]
      summary: Delete project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project deleted

  /projects/{id}/tasks:
    get:
      tags: [Tasks]
      summary: Get project tasks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
        - in: query
          name: status
          schema:
            type: string
            enum: [todo, in_progress, done]
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high]
      responses:
        "200":
          description: Task list

    post:
      tags: [Tasks]
      summary: Create task inside project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task details

    patch:
      tags: [Tasks]
      summary: Update task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated

    delete:
      tags: [Tasks]
      summary: Delete task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task deleted

  /tasks/{id}/assignees:
    post:
      tags: [Assignees]
      summary: Add assignee to task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssigneeCreate"
      responses:
        "201":
          description: Assignee added

  /tasks/{taskId}/assignees/{userId}:
    delete:
      tags: [Assignees]
      summary: Remove assignee from task
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: integer
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignee removed

  /tasks/{id}/comments:
    get:
      tags: [Comments]
      summary: Get task comments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Comment list

    post:
      tags: [Comments]
      summary: Create task comment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreate"
      responses:
        "201":
          description: Comment created

  /me/tasks:
    get:
      tags: [My Tasks]
      summary: Get authenticated user assigned tasks
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
        - in: query
          name: status
          schema:
            type: string
            enum: [todo, in_progress, done]
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high]
      responses:
        "200":
          description: My assigned tasks
